SPECIFICATION MCSpec

CONSTANTS
    Task = {t1, t2, t3}
    Book = {b1}
    Translation = {tr1}
    Dictionary = {d1}
    Paragraph = {p1, p2}
    MaxBookContention = 3
    RefactorLimit = 0
    MaxTranslatorOps = 4

CONSTRAINT StateConstraint

\* ========================================================================
\* Structural invariants (always checked)
\* ========================================================================
INVARIANTS
    MCMutexExclusivity
    MCPCConsistency

\* ========================================================================
\* Standard safety invariants
\* ========================================================================
INVARIANTS
    MCNoDeadlock
    MCLockOrderConsistency
    MCNoSelfDeadlock

\* ========================================================================
\* Extension invariants (bug-family specific — enable for hunting)
\* ========================================================================
\* INVARIANT MCNoDuplicateActiveRequest
\* INVARIANT MCBoundedContention
