\* Hunting config: Family 1 — Lock starvation via long-held book Mutex
\* Checks BoundedContention with MaxBookContention = 0 (no waiting allowed)
\* Uses tight bounds: 3 tasks all targeting same book, with save operations

SPECIFICATION MCSpec

CONSTANTS
    Task = {t1, t2, t3}
    Book = {b1}
    Translation = {tr1}
    Dictionary = {d1}
    Paragraph = {p1}
    MaxBookContention = 0
    RefactorLimit = 0
    MaxTranslatorOps = 2

CONSTRAINT StateConstraint

INVARIANTS
    MCMutexExclusivity
    MCBoundedContention
    MCNoDeadlock
