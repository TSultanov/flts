\* Hunting config: Family 3 — Fragile double-lock in get_or_create_translation
\* Injects the refactored pattern where the guard is held across both checks.
\* RefactorLimit = 1 enables the fault; expects NoSelfDeadlock to hold
\* (the refactored version blocks forever, detected as deadlock not invariant
\* violation — TLC will report "deadlock reached" when the refactored task
\* can never proceed).

SPECIFICATION MCSpec

CONSTANTS
    Task = {t1}
    Book = {b1}
    Translation = {tr1}
    Dictionary = {d1}
    Paragraph = {p1}
    MaxBookContention = 1
    RefactorLimit = 1
    MaxTranslatorOps = 2

CONSTRAINT StateConstraint

INVARIANTS
    MCMutexExclusivity
    MCNoSelfDeadlock
