\* Hunting config: Family 2 — TOCTOU in translation queue dedup
\* Checks NoDuplicateActiveRequest: two translators for same paragraph
\* Tight bounds: 2 translators, 1 book, 1 paragraph, minimal other actions

SPECIFICATION MCSpec

CONSTANTS
    Task = {t1, t2}
    Book = {b1}
    Translation = {tr1}
    Dictionary = {d1}
    Paragraph = {p1}
    MaxBookContention = 2
    RefactorLimit = 0
    MaxTranslatorOps = 4

CONSTRAINT StateConstraint

INVARIANTS
    MCMutexExclusivity
    MCNoDuplicateActiveRequest
    MCNoDeadlock
