\* Trace validation config for FLTS Mutex / Lock Safety (Category B)
\* Uses named-lock events from TracedMutex (Acq/Rel with lock names).
\*
\* Constants below are populated by the preprocessor based on observed
\* trace data. Run: python3 harness/mutex/preprocess.py <trace_dir>

SPECIFICATION TraceSpec

CONSTANTS
    Task = {t1, t2, t3}
    BookLock = {b1}
    TransLock = {tr1}
    DictLock = {d1}

\* Safety: each lock held by at most one task
INVARIANTS
    MutexExclusivity

\* Liveness: full trace must be consumed (fails if lock ordering violated
\* or mutual exclusion broken, since the Acq action becomes disabled)
PROPERTIES
    TraceFullyConsumed
