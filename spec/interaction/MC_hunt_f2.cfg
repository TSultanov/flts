\* MC_hunt_f2.cfg — Hunt for F2: Event Ordering / Stale Snapshots
\* ConfigChange disabled (F2 occurs even without config change).
\* 3 tasks to create interleaving between snapshot and emit phases.

SPECIFICATION MCSpec

CONSTANTS
    Task = {t1, t2, t3}
    Book = {b1}
    ConfigChangeLimit = 0
    AppCloseLimit = 0
    MaxTruthVersion = 6

CONSTRAINT StateConstraint

INVARIANTS
    MCPCConsistency
    MCTaskLibraryValidity
    MCEventMonotonicity
    MCUIConsistency
