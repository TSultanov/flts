\* MC_hunt_f2.cfg — Hunt for F2: Event Ordering / Stale Snapshots
\* UNFIXED for eventToReadable FIFO pattern (modeled here).
\* The emit_versioned fix is a no-op for FIFO delivery — emit version
\* always increases, so the check never rejects.
\* This config will still produce violations.

SPECIFICATION MCSpec

CONSTANTS
    Task = {t1, t2, t3}
    Book = {b1}
    ConfigChangeLimit = 0
    AppCloseLimit = 0
    MaxTruthVersion = 6

CONSTRAINT StateConstraint

INVARIANTS
    MCPCConsistency
    MCTaskLibraryValidity
    MCEventMonotonicity
    MCUIConsistency
