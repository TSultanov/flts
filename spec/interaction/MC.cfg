SPECIFICATION MCSpec

CONSTANTS
    Task = {t1, t2}
    Book = {b1}
    ConfigChangeLimit = 1
    AppCloseLimit = 0
    MaxTruthVersion = 6

CONSTRAINT StateConstraint

\* ========================================================================
\* Structural invariants (always checked)
\* ========================================================================
INVARIANTS
    MCPCConsistency
    MCTaskLibraryValidity

\* ========================================================================
\* Fixed invariants (F1, F2, F3 — should pass after spec update)
\* ========================================================================
    MCStaleLibrarySafety
    MCNoDataLoss
    MCEventMonotonicity
    MCUIConsistency
\* MCNoPersistenceLoss  \* Requires AppCloseLimit > 0 to be meaningful

\* ========================================================================
\* Fixed action properties (F4 — temporal, not state invariant)
\* ========================================================================
PROPERTY
    MCNoStaleTranslation
