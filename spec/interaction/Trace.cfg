\* Trace validation config for FLTS Frontend-Backend Command/Event Protocol
\* (Category B: concurrent, not distributed)
\*
\* Trace events are per-task NDJSON with timestamps (start/end).
\* Constants below are populated by the preprocessor based on observed
\* trace data. Run: python3 harness/interaction/preprocess.py <trace_dir>

SPECIFICATION TraceSpec

CONSTANTS
    Task = {t1, t2}
    Book = {b1}

\* Safety: structural consistency during trace replay
INVARIANTS
    TracePCConsistency
    TraceEventMonotonicity

\* Liveness: full trace must be consumed (fails if spec diverges from trace)
PROPERTIES
    TraceFullyConsumed
