\* MC_hunt_f3.cfg — Hunt for F3: No Shutdown Persistence
\* AppClose IS enabled (the fault injection).
\* 1 task + AppClose is enough to demonstrate unsaved state on close.

SPECIFICATION MCSpec

CONSTANTS
    Task = {t1}
    Book = {b1}
    ConfigChangeLimit = 0
    AppCloseLimit = 1
    MaxTruthVersion = 5

CONSTRAINT StateConstraint

INVARIANTS
    MCPCConsistency
    MCTaskLibraryValidity
    MCNoPersistenceLoss
