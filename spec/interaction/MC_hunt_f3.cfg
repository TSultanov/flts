\* MC_hunt_f3.cfg — Hunt for F3: No Shutdown Persistence
\* FIXED: AppClose now calls save_all() to flush dirty state.
\* This config should produce NO violations.

SPECIFICATION MCSpec

CHECK_DEADLOCK FALSE

CONSTANTS
    Task = {t1}
    Book = {b1}
    ConfigChangeLimit = 0
    AppCloseLimit = 1
    MaxTruthVersion = 5

CONSTRAINT StateConstraint

INVARIANTS
    MCPCConsistency
    MCTaskLibraryValidity
    MCNoPersistenceLoss
