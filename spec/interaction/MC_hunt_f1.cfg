\* MC_hunt_f1.cfg — Hunt for F1: Stale Library Reference
\* ConfigChange IS enabled (the fault injection that creates stale refs).
\* 2 tasks so one can be mid-lifecycle when ConfigChange fires.

SPECIFICATION MCSpec

CONSTANTS
    Task = {t1, t2}
    Book = {b1}
    ConfigChangeLimit = 2
    AppCloseLimit = 0
    MaxTruthVersion = 8

CONSTRAINT StateConstraint

INVARIANTS
    MCPCConsistency
    MCTaskLibraryValidity
    MCStaleLibrarySafety
    MCNoDataLoss
