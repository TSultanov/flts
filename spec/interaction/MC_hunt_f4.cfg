\* MC_hunt_f4.cfg — Hunt for F4: Translation Lifecycle Atomicity
\* FIXED: handle_request() now re-reads paragraph text before storing
\* and discards translation if content changed (bookVersion mismatch).
\* File watcher enabled (creates the version change between read and store).
\* 2 tasks so a watcher can reload between a worker's read and store.
\* Expected: NoStaleTranslation should PASS (no violations).

SPECIFICATION MCSpec

CONSTANTS
    Task = {t1, t2}
    Book = {b1}
    ConfigChangeLimit = 0
    AppCloseLimit = 0
    MaxTruthVersion = 7

CONSTRAINT StateConstraint

INVARIANTS
    MCPCConsistency
    MCTaskLibraryValidity

PROPERTY
    MCNoStaleTranslation
