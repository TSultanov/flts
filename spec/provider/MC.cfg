SPECIFICATION MCSpec

CONSTANTS
    Request = {r1, r2}
    OpenAI = openai
    Gemini = gemini
    Nil = nil
    TrackedQueuedReq = r2
    RequestLimit = 2
    ChunkLimit = 2
    KeepAliveLimit = 1
    TimeoutLimit = 2
    TotalTimeoutLimit = 1
    StreamErrorLimit = 1

CHECK_DEADLOCK FALSE

CONSTRAINT StateConstraint

INVARIANTS
    MCTypeOK
    MCWorkerDiscipline
    MCQueueMatchesState
    MCSuccessRequiresValidBuffer
\*  MCFailureStatusNotComplete
\*  MCFirstChunkErrorIsRetried
