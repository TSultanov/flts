\* Trace-validation config for the roster-mesh spec (vector-clock model).
\*
\* Node is the harness's actual device ids; MaxClock must be >= the largest vclock
\* component in the trace (>= max ops issued by any single node). Select a trace
\* with -DJSON=... or the default ../../traces/roster.ndjson.

CONSTANTS
    Node = {"n1", "n2", "n3"}
    MaxClock = 16

SPECIFICATION TraceSpec
CHECK_DEADLOCK FALSE
VIEW TraceView

PROPERTIES
    TraceMatched

INVARIANTS
    TypeOK
