\* Trace-validation config for the roster-mesh spec.
\*
\* Node and MaxClock are placeholders: set Node to the harness's actual device ids
\* and MaxClock >= the number of distinct wall-clock timestamps in the trace
\* (DenseTs maps real ms into 1..|ObservedTs|). Select a trace with -DJSON=...
\* or the default ../../traces/roster.ndjson.

CONSTANTS
    Node = {n1, n2, n3}
    MaxClock = 16
    Nil = nil

SPECIFICATION TraceSpec
CHECK_DEADLOCK FALSE
VIEW TraceView

PROPERTIES
    TraceMatched

INVARIANTS
    TypeOK
    RosterDisjoint
