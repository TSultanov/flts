\* Family 3 hunt — mesh closure (liveness).
\*
\* Open question (brief M2): does pairing through a single hub fan out to a FULL
\* mesh without manually approving every pair? Pair A->B (+approve) and A->C
\* (+approve); B and C are never paired directly. Roster sync + reconcile must make
\* B and C mutual on their own.
\*
\* Checks the safety surrogate MeshClosesWhenSettled: at any fully-settled fixpoint
\* (roster sync + reconcile both quiesced), every in-mesh node pair is mutual — the
\* hub pairing has fanned out to a full mesh. No unpair/ensureSelf.

CONSTANTS
    Node = {n1, n2, n3}
    MaxClock = 2

    MaxPairLimit       = 2
    MaxUnpairLimit     = 0
    MaxApproveLimit    = 2
    MaxEnsureSelfLimit = 0

SPECIFICATION MCSpec
CHECK_DEADLOCK FALSE
SYMMETRY Symmetry
VIEW View

INVARIANTS
    TypeOK
    MeshClosesWhenSettled

\* Liveness form (<>AllConnected) is also defined in MC.tla as MeshConverges, but
\* needs forced-pairing fairness to avoid stuttering on never-paired setups. The
\* safety surrogate above checks the same closure guarantee without that tuning.
\* Re-enable in validation-workflow if desired:
\* PROPERTIES
\*     MeshConverges
