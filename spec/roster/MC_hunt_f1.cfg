\* Family 1 hunt — roster CRDT convergence + causal correctness under clock skew.
\*
\* Open question (brief M1/M3): with per-device wall clocks, can a remove stamped
\* with a ts older than an earlier add (skew) survive the merge so a removed device
\* stays active after the mesh converges? And does the CRDT always converge?
\*
\* Setup: pair a 3-node mesh, then remove + re-add a device with freely-chosen
\* (skewable) timestamps. MaxClock=2 makes ts inversions (add@2 vs remove@1) reachable.

CONSTANTS
    Node = {n1, n2, n3}
    MaxClock = 2

    MaxPairLimit       = 3
    MaxUnpairLimit     = 1
    MaxApproveLimit    = 2
    MaxEnsureSelfLimit = 0

SPECIFICATION MCSpec
CHECK_DEADLOCK FALSE
SYMMETRY Symmetry
VIEW View

INVARIANTS
    TypeOK
    ConvergenceAgreement
    NoSpuriousResurrection
