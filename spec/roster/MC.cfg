\* Convergence / structural config for the roster-mesh spec.
\* Used to validate the spec (no runtime errors, structural invariants hold).
\* Bug-family (extension) invariants are listed but COMMENTED OUT here — they are
\* enabled in the per-family MC_hunt_*.cfg files.

CONSTANTS
    Node = {n1, n2, n3}
    MaxClock = 2

    MaxPairLimit       = 2
    MaxUnpairLimit     = 1
    MaxApproveLimit    = 2
    MaxEnsureSelfLimit = 0

SPECIFICATION MCSpec
CHECK_DEADLOCK FALSE
SYMMETRY Symmetry
VIEW View

INVARIANTS
    TypeOK
    NoSelfPeer

\* Extension invariants (enabled in hunt cfgs):
\*    ConvergenceAgreement
\*    NoSpuriousResurrection
\*    ReconcileNeverDropsActive
