[package]
name = "library"
version = "0.1.0"
edition = "2024"

[features]
default = []
tla_trace = []

[dependencies]
ahash = "0.8.12"
anyhow = "1.0.102"
async-openai = { version = "0.34.0", default-features = false, features = ["_api", "chat-completion", "chat-completion-types", "native-tls"] }
async-trait = "0.1.89"
epub = "=2.1.5"
fnv = "1.0.7"
futures-util = { version = "0.3.32", default-features = false, features = ["std"] }
isolang = "2.4.0"
itertools = "0.14.0"
log = "0.4.29"
notify = "8.2.0"
notify-debouncer-full = "0.7.0"
rand = "0.10.1"
regex-lite = "0.1.7"
reqwest = { version = "0.12", default-features = false, features = ["json", "native-tls"] }
ringbuffer = "0.16.0"
scraper = { version = "0.26.0", default-features = false }
serde = "1.0.228"
serde_json = "1.0.149"
strum = { version = "0.28.0", features = ["derive"] }
tokio = { version = "1.52.3", features = ["rt-multi-thread", "macros", "sync", "fs", "time", "io-util", "process"] }
zstd = { version = "0.13.3", default-features = false, features = ["arrays"] }

[dependencies.uuid]
version = "1.23.0"
# Lets you generate random UUIDs
features = [
    "v4",
]

[target.'cfg(any(target_os = "macos", target_os = "windows", target_os = "linux"))'.dependencies]
trash = "5.2.5"

[target.'cfg(target_os = "macos")'.dependencies]
core-foundation = "0.10.1"

[target.'cfg(target_os = "ios")'.dependencies]
objc2 = "0.6.4"
objc2-foundation = "0.3.2"
objc2-ui-kit = "0.3.2"

[dev-dependencies]
criterion = "0.8.2"

[[bench]]
name = "translation_bench"
harness = false
