[package]
name = "library"
version = "0.1.0"
edition = "2024"

[features]
default = []
tla_trace = []

[dependencies]
ahash = { workspace = true }
anyhow = { workspace = true }
async-openai = { version = "0.34.0", default-features = false, features = ["_api", "chat-completion", "chat-completion-types", "native-tls"] }
async-trait = "0.1.89"
epub = "=2.1.5"
fnv = "1.0.7"
htmlentity = "1.3.2"
futures-util = { version = "0.3.32", default-features = false, features = ["std"] }
isolang = { workspace = true, features = ["local_names"] }
itertools = "0.14.0"
log = { workspace = true }
notify = "8.2.0"
notify-debouncer-full = "0.7.0"
rand = { workspace = true }
regex-lite = "0.1.7"
reqwest = { workspace = true }
ringbuffer = "0.16.0"
scraper = { version = "0.26.0", default-features = false }
serde = { workspace = true }
serde_json = { workspace = true }
strum = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "fs", "time", "io-util", "process"] }
unicode-normalization = { workspace = true }
uuid = { workspace = true }
zstd = { version = "0.13.3", default-features = false, features = ["arrays"] }

[target.'cfg(any(target_os = "macos", target_os = "windows", target_os = "linux"))'.dependencies]
trash = "5.2.5"

[target.'cfg(target_os = "macos")'.dependencies]
core-foundation = "0.10.1"

[target.'cfg(target_os = "ios")'.dependencies]
objc2 = "0.6.4"
objc2-foundation = "0.3.2"
objc2-ui-kit = "0.3.2"

[dev-dependencies]
criterion = "0.8.2"
tokio = { workspace = true, features = ["test-util"] }

[[bench]]
name = "translation_bench"
harness = false
